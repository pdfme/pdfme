version: 2
updates:
  # Root package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "npm"
    groups:
      eslint-packages:
        patterns:
          - "eslint*"
          - "@typescript-eslint*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@testing-library/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "canvas"
        update-types: ["version-update:semver-major"]
  
  # Common package
  - package-ecosystem: "npm"
    directory: "/packages/common"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "npm"
    groups:
      eslint-packages:
        patterns:
          - "eslint*"
          - "@typescript-eslint*"
        update-types:
