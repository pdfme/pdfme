name: Testing

on: [pull_request]

jobs:
  pdfme-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run lint:oxlint
      - run: npm run lint:typecheck
      - run: npm run typecheck
      - run: npm run build
      - run: npm run lint
      - run: npm run test
        env:
          CI: true

  playground-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install workspace dependencies and build packages
        run: |
          npm ci
          npm run build
      - name: Install playground dependencies
        run: |
          npm ci --prefix playground
      - name: Run playground checks
        run: |
          npm run lint:playground
          npm run build:playground
          npm run test:playground
        env:
          CI: true
