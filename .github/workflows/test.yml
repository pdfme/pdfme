name: Testing

on: [pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pdfme-core:
    name: pdfme-test / packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            playground/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: ./node_modules/.bin/vp run --filter '@pdfme/*' lint
      - run: npm run build
      - run: npm run test:packages
        env:
          CI: true

  pdfme-cli:
    name: pdfme-test / cli (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: validate
            test_files: __tests__/validate.test.ts
          - suite: generate
            test_files: __tests__/generate.test.ts
          - suite: doctor
            test_files: __tests__/doctor.test.ts
          - suite: examples-integration
            test_files: __tests__/examples.integration.test.ts
          - suite: rest
            test_files: __tests__ --exclude __tests__/validate.test.ts --exclude __tests__/generate.test.ts --exclude __tests__/doctor.test.ts --exclude __tests__/examples.integration.test.ts
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            playground/package-lock.json
      - run: npm ci
      - run: npm run build:cli
      - run: npm run test:cli -- ${{ matrix.test_files }}
        env:
          CI: true

  pdfme-test:
    name: pdfme-test
    runs-on: ubuntu-latest
    needs:
      - pdfme-core
      - pdfme-cli
    if: always()
    steps:
      - name: Check pdfme test suites
        run: |
          if [ "${{ needs.pdfme-core.result }}" != "success" ] || [ "${{ needs.pdfme-cli.result }}" != "success" ]; then
            echo "pdfme-core: ${{ needs.pdfme-core.result }}"
            echo "pdfme-cli: ${{ needs.pdfme-cli.result }}"
            exit 1
          fi

  playground-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            playground/package-lock.json
      - name: Install workspace dependencies and build packages
        run: |
          npm ci
          npm run build
      - name: Install playground dependencies
        run: |
          npm ci --prefix playground
      - name: Install Puppeteer Chrome
        working-directory: playground
        env:
          PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer
        run: |
          node <<'NODE'
          (async () => {
            const { Browser, detectBrowserPlatform, install } = require('@puppeteer/browsers');
            const { PUPPETEER_REVISIONS } = require('./node_modules/puppeteer-core/lib/cjs/puppeteer/revisions.js');

            const platform = detectBrowserPlatform();
            if (!platform) {
              throw new Error('Unable to detect browser platform');
            }

            const result = await install({
              browser: Browser.CHROME,
              buildId: PUPPETEER_REVISIONS.chrome,
              cacheDir: process.env.PUPPETEER_CACHE_DIR,
              platform,
              downloadProgressCallback: 'default',
            });

            console.log(`chrome (${result.buildId}) downloaded to ${result.path}`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
          CHROME_PATH="$(node -e "process.stdout.write(require('puppeteer').executablePath())")"
          test -x "$CHROME_PATH"
          echo "$CHROME_PATH"
      - name: Run playground checks
        run: |
          npm --prefix playground run lint
          npm --prefix playground run build
          npm --prefix playground run test
        env:
          CI: true
          PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer
